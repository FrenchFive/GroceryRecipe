<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1565c0">
  <meta name="description" content="Plan your meals, build your shopping list">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GroceryRecipe">

  <title>GroceryRecipe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <!-- lucide icons are now rendered inline via app.js, no external script needed -->
</head>
<body>

<div id="app">

  <!-- ── Top header ─────────────────────────────────────── -->
  <header id="top-header">
    <button id="back-btn" class="back-btn" style="display:none;" aria-label="Go back"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg></button>
    <h1 id="header-title"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chef-hat header-icon" aria-hidden="true"><path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"/><path d="M6 17h12"/></svg> Recipes</h1>
    <button id="btn-add-recipe" aria-label="Add recipe"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus" aria-hidden="true"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
  </header>

  <!-- ── Pages ──────────────────────────────────────────── -->
  <main id="pages">

    <!-- Recipes page -->
    <section class="page" id="page-recipes">
      <div class="search-wrap">
        <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-search" aria-hidden="true"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg></span>
        <input type="search" id="recipe-search" placeholder="Search recipes…" aria-label="Search recipes">
      </div>
      <div id="recipe-list"></div>
    </section>

    <!-- Detail page (rendered by JS) -->
    <section class="page" id="page-detail"></section>

    <!-- Add / Edit page (rendered by JS) -->
    <section class="page" id="page-add"></section>

    <!-- Shopping list page -->
    <section class="page" id="page-shopping"></section>

    <!-- Weekly planner page -->
    <section class="page" id="page-planner"></section>

    <!-- Profile / Settings page -->
    <section class="page" id="page-profile"></section>

  </main>

  <!-- ── Bottom navigation ──────────────────────────────── -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-page="recipes" aria-label="Recipes">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chef-hat" aria-hidden="true"><path d="M17 21a1 1 0 0 0 1-1v-5.35c0-.457.316-.844.727-1.041a4 4 0 0 0-2.134-7.589 5 5 0 0 0-9.186 0 4 4 0 0 0-2.134 7.588c.411.198.727.585.727 1.041V20a1 1 0 0 0 1 1Z"/><path d="M6 17h12"/></svg></span>
      <span>Recipes</span>
    </button>
    <button class="nav-btn" data-page="planner" aria-label="Planner">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-days" aria-hidden="true"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg></span>
      <span>Planner</span>
    </button>
    <button class="nav-btn" data-page="shopping" aria-label="Shopping">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-cart" aria-hidden="true"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg></span>
      <span>Shopping</span>
    </button>
    <button class="nav-btn" data-page="profile" aria-label="Profile">
      <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
      <span>Profile</span>
    </button>
  </nav>

</div>

<!-- ── Toast notification ─────────────────────────────────── -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- ── Meal picker bottom sheet ──────────────────────────── -->
<div id="meal-picker" aria-modal="true" role="dialog" aria-labelledby="meal-picker-title">
  <div id="meal-picker-backdrop"></div>
  <div id="meal-picker-sheet">
    <div class="picker-handle"></div>
    <div id="meal-picker-title"></div>
    <div id="meal-picker-list"></div>
  </div>
</div>

<!-- ── Add shopping item bottom sheet ─────────────────────── -->
<div id="shop-add-picker" aria-modal="true" role="dialog" aria-labelledby="sap-title">
  <div id="shop-add-backdrop"></div>
  <div id="shop-add-sheet">
    <div class="picker-handle"></div>
    <div id="sap-title">Add Item</div>
    <form id="sap-form" autocomplete="off">
      <div class="sap-field">
        <label for="sap-name">Item name</label>
        <input type="text" id="sap-name" placeholder="e.g. Milk" required>
      </div>
      <div class="sap-row">
        <div class="sap-field" style="flex:1">
          <label for="sap-qty">Qty</label>
          <input type="text" id="sap-qty" placeholder="1" inputmode="decimal">
        </div>
        <div class="sap-field" style="flex:1">
          <label for="sap-unit">Unit</label>
          <input type="text" id="sap-unit" placeholder="e.g. L, kg">
        </div>
      </div>
      <label class="sap-recurring-toggle">
        <input type="checkbox" id="sap-recurring"> <span>Recurring (every week)</span>
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px;">Add to list</button>
    </form>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
<!-- icons are inline SVGs, no createIcons() needed -->
</body>
</html>
