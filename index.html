<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2e7d32">
  <meta name="description" content="Plan your meals, build your shopping list">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GroceryRecipe">

  <title>GroceryRecipe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ── Top header ─────────────────────────────────────── -->
  <header id="top-header">
    <button id="back-btn" class="back-btn" style="display:none;" aria-label="Go back">‹</button>
    <h1 id="header-title">🥘 Recipes</h1>
    <button id="btn-add-recipe" aria-label="Add recipe">+</button>
  </header>

  <!-- ── Pages ──────────────────────────────────────────── -->
  <main id="pages">

    <!-- Recipes page -->
    <section class="page" id="page-recipes">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="recipe-search" placeholder="Search recipes…" aria-label="Search recipes">
      </div>
      <div id="recipe-list"></div>
    </section>

    <!-- Detail page (rendered by JS) -->
    <section class="page" id="page-detail"></section>

    <!-- Add / Edit page (rendered by JS) -->
    <section class="page" id="page-add"></section>

    <!-- Shopping list page -->
    <section class="page" id="page-shopping"></section>

    <!-- Weekly planner page -->
    <section class="page" id="page-planner"></section>

    <!-- Profile / Settings page -->
    <section class="page" id="page-profile"></section>

  </main>

  <!-- ── Bottom navigation ──────────────────────────────── -->
  <nav id="bottom-nav">
    <button class="nav-btn active" data-page="recipes" aria-label="Recipes">
      <span class="icon">🥘</span>
      <span>Recipes</span>
    </button>
    <button class="nav-btn" data-page="planner" aria-label="Planner">
      <span class="icon">📅</span>
      <span>Planner</span>
    </button>
    <button class="nav-btn" data-page="shopping" aria-label="Shopping">
      <span class="icon">🛒</span>
      <span>Shopping</span>
    </button>
    <button class="nav-btn" data-page="profile" aria-label="Profile">
      <span class="icon">👤</span>
      <span>Profile</span>
    </button>
  </nav>

</div>

<!-- ── Toast notification ─────────────────────────────────── -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- ── Meal picker bottom sheet ──────────────────────────── -->
<div id="meal-picker" aria-modal="true" role="dialog" aria-labelledby="meal-picker-title">
  <div id="meal-picker-backdrop"></div>
  <div id="meal-picker-sheet">
    <div class="picker-handle"></div>
    <div id="meal-picker-title"></div>
    <div id="meal-picker-list"></div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/app.js"></script>
</body>
</html>
